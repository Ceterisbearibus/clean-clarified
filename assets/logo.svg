<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Clean Clarified</title>
  <desc>Clean Clarified logo: a teal C-shaped monogram with an amber lightning bolt, paired with an all-caps stacked wordmark and the tagline Energy savings simplified</desc>

  <!-- Icon: C shape with lightning bolt -->
  <g transform="translate(20, 30)">
    <path d="M60 20 A32 32 0 1 0 60 56" fill="none" stroke="#1D9E75" stroke-width="5" stroke-linecap="round"/>
    <path d="M32 18 L20 38 L29 38 L22 58 L44 34 L34 34 Z" fill="#EF9F27"/>
  </g>

  <!-- Wordmark -->
  <text x="134" y="76" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600" fill="#1A1A1A" letter-spacing="-0.5">CLEAN</text>
  <text x="134" y="110" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="400" fill="#5A5A5A" letter-spacing="-0.5">CLARIFIED</text>
  <rect x="134" y="115" width="202" height="2.5" rx="1.25" fill="#EF9F27"/>
  <text x="134" y="138" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8A8A8A" letter-spacing="0.3">Energy savings simplified</text>
</svg>
